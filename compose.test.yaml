services:
  app:
    build: .
    container_name: reflex_app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      retries: 30
    depends_on:
      db:
        condition: service_healthy

  e2e:
    build: ./e2e
    container_name: cypress_test
    volumes:
      - ./e2e/cypress:/e2e/cypress
      - ./e2e/cypress.config.js:/e2e/cypress.config.js
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    command:
      npx cypress run

  db:
    image: postgres:16
    container_name: reflex_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reflex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reflex_db"]
      interval: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data: